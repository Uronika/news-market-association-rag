services:
  postgres:
    image: postgres:16
    container_name: news_market_rag_pg
    environment:
      POSTGRES_DB: news_market_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
